# ============================================================
# railway.toml — Konfigurasi deploy EkskulDash v2 ke Railway
# Dokumentasi: https://docs.railway.app/reference/config-as-code
# ============================================================

[build]
# Gunakan Nixpacks (Railway default builder — lebih cepat dari Docker)
builder = "NIXPACKS"

# Perintah build: generate Prisma client dulu, baru build Next.js
buildCommand = "npx prisma generate && npm run build"

[deploy]
# Perintah start: jalankan migration dulu, baru start server
# Note: prisma db push digunakan untuk sinkronisasi schema tanpa migration files
startCommand = "npx prisma db push && npx tsx scripts/seed.ts; npm start"

# Health check — Railway akan cek endpoint ini setelah deploy
healthcheckPath = "/api/auth/me"
healthcheckTimeout = 60

# Restart otomatis jika crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
# Nama service di Railway dashboard
name = "ekskul-app"
