version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekskul_app
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      # Supabase PostgreSQL (cloud) — tidak perlu service DB lokal
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    networks:
      - ekskul_net

networks:
  ekskul_net:
    driver: bridge
